<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/table-styling.css">
    <title>Document</title>
</head>

<body>

    <h2>Employee List</h2>

    <table>
        <thead>
            <tr>
                <td>Employee ID</td>
                <td>Full Name</td>
                <td>Position</td>
                <td>Salary</td>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>Ahmed Ali</td>
                <td>Manager</td>
                <td>$3,500</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Fatima Noor</td>
                <td>Accountant</td>
                <td>$2,800</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Total Salaries</td>
                <td colspan="3">$6300</td>
            </tr>
        </tfoot>
    </table>


</body>

</html>
